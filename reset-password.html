<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đặt lại mật khẩu - Đường Gia Phát</title>
  <meta
    name="description"
    content="Đặt lại mật khẩu tài khoản Đường Gia Phát một cách nhanh chóng và an toàn."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="site-shell">
    <div id="siteHeader"></div>

    <main class="auth-page auth-page--compact">
      <section class="auth-page__hero">
        <div class="container auth-page__grid auth-page__grid--center">
          <div class="auth-page__card auth-page__card--wide">
            <div class="auth-panel">
              <div class="auth-panel__header">
                <span class="section-kicker">Quên mật khẩu</span>
                <h1>Đặt lại mật khẩu</h1>
                <p>Nhập email và mật khẩu mới để cập nhật lại tài khoản của bạn.</p>
              </div>

              <form class="auth-form" id="resetPasswordForm">
                <label>
                  <span>Email</span>
                  <input
                    type="email"
                    name="email"
                    id="resetPasswordEmail"
                    autocomplete="username"
                    placeholder="Nhập email tài khoản"
                  />
                </label>

                <label>
                  <span>Mật khẩu mới</span>
                  <input
                    type="password"
                    name="newPassword"
                    id="resetPasswordNewPassword"
                    autocomplete="new-password"
                    placeholder="Nhập mật khẩu mới"
                  />
                </label>

                <label>
                  <span>Xác nhận mật khẩu mới</span>
                  <input
                    type="password"
                    name="confirmPassword"
                    id="resetPasswordConfirmPassword"
                    autocomplete="new-password"
                    placeholder="Nhập lại mật khẩu mới"
                  />
                </label>

                <button type="submit" class="btn btn--primary btn--block">Cập nhật mật khẩu</button>
                <a href="login.html" class="btn btn--light btn--block">Quay lại đăng nhập</a>
                <p class="auth-status" id="resetPasswordStatus" aria-live="polite"></p>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="siteFooter"></div>
  </div>

  <script src="js/components/layout.js"></script>
  <script src="js/reset-password-page.js"></script>
</body>
</html>
