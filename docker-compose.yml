services:
  app:
    image: node:20-alpine
    container_name: dgstore-app
    working_dir: /app
    command: sh -c "npm install && npm start"
    environment:
      PORT: 3001
      HOST: 0.0.0.0
      DB_HOST: mysql
      DB_USER: dgstore
      DB_PASSWORD: dgstore123
      DB_NAME: duonggiaphat
      JWT_SECRET: dev_secret_key_change_me
    ports:
      - "3001:3001"
    volumes:
      - ./:/app
    depends_on:
      - mysql
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: dgstore-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: duonggiaphat
      MYSQL_USER: dgstore
      MYSQL_PASSWORD: dgstore123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
