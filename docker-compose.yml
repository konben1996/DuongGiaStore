services:
  mysql:
    image: mysql:8.0
    container_name: dgstore-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: duonggiaphat
      MYSQL_USER: dgstore
      MYSQL_PASSWORD: dgstore123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
