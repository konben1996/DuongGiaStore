<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - Đường Gia Phát</title>
  <meta
    name="description"
    content="Đăng nhập tài khoản Đường Gia Phát để mua sắm nhanh hơn, lưu thông tin cá nhân và theo dõi đơn hàng."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="site-shell">
    <div id="siteHeader"></div>

    <main class="auth-page auth-page--compact">
      <section class="auth-page__hero">
        <div class="container auth-page__grid auth-page__grid--center">
          <div class="auth-page__card auth-page__card--wide">
            <div class="auth-panel">
              <div class="auth-panel__header">
                <span class="section-kicker">Đăng nhập</span>
                <h1>Chào mừng bạn quay lại</h1>
                <p>Đăng nhập để tiếp tục mua sắm và quản lý tài khoản.</p>
              </div>

              <form class="auth-form" id="loginPageForm">
                <label>
                  <span>Email</span>
                  <input
                    type="email"
                    name="email"
                    id="loginPageEmail"
                    autocomplete="username"
                    placeholder="Nhập email"
                  />
                </label>

                <label>
                  <span>Mật khẩu</span>
                  <input
                    type="password"
                    name="password"
                    id="loginPagePassword"
                    autocomplete="current-password"
                    placeholder="Nhập mật khẩu"
                  />
                </label>

                <div class="checkbox-line">
                  <input type="checkbox" id="loginPageRemember" name="rememberLogin" />
                  <label for="loginPageRemember">Ghi nhớ đăng nhập</label>
                </div>

                <button type="submit" class="btn btn--primary btn--block">Đăng nhập</button>
                <a href="register.html" class="btn btn--light btn--block">Chưa có tài khoản? Đăng ký</a>
                <p class="auth-status" id="loginPageStatus" aria-live="polite"></p>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="siteFooter"></div>
  </div>

  <script src="js/components/layout.js"></script>
  <script src="js/login-page.js"></script>
</body>
</html>
